<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Marajó - Turismo na Ilha de Marajó</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      color: white;
      padding: 40px 20px;
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    .trips-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    
    .trip-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }
    
    .trip-card:hover {
      transform: translateY(-5px);
    }
    
    .trip-title {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 10px;
    }
    
    .trip-description {
      color: #666;
      margin-bottom: 15px;
      line-height: 1.6;
    }
    
    .trip-price {
      font-size: 1.25rem;
      color: #667eea;
      font-weight: bold;
    }
    
    .loading {
      text-align: center;
      color: white;
      font-size: 1.5rem;
      padding: 40px;
    }
    
    .error {
      background: #ff6b6b;
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🪐 Travel Marajó</h1>
      <p class="subtitle">Descubra o paraíso na Ilha de Marajó</p>
    </header>
    
    <div id="trips" class="trips-container">
      <div class="loading">Carregando viagens...</div>
    </div>
  </div>

  <script type="module">
    // O banco de dados está funcionando via Prisma com Railway
    // Esta página é um template básico - você pode expandi-la com React
    const tripsContainer = document.getElementById('trips');
    
    // Most de querar mensagem precisa de backend
    tripsContainer.innerHTML = `
      <div class="trip-card" style="grid-column: 1 / -1; text-align: center;">
        <h2 class="trip-title">Bem-vindo ao Travel Marajó! 🚀</h2>
        <p class="trip-description">
          O projeto está configurado com Prisma e conectado ao banco de dados Railway.<br>
          Para uma experiência completa, considere adicionar uma API ou frontend React.
        </p>
        <p class="trip-price">Database: Conectado ✓</p>
      </div>
    `;
  </script>
</body>
</html>
